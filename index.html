<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансовый Симулятор — KiberOne</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070a0f;
  --surface: #0d1117;
  --card: #111720;
  --card2: #161d27;
  --border: #1e2a38;
  --border2: #243040;
  --gold: #c9a84c;
  --gold2: #e8c86a;
  --gold-dim: rgba(201,168,76,0.12);
  --red: #e05252;
  --red-dim: rgba(224,82,82,0.1);
  --green: #3fb68c;
  --green-dim: rgba(63,182,140,0.1);
  --blue: #4a9eff;
  --blue-dim: rgba(74,158,255,0.08);
  --text: #e8edf2;
  --muted: #6b7f96;
  --muted2: #8fa3b8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background Grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(74,158,255,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}
.kib-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.kib-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--gold);
}
h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 7vw, 52px);
  font-weight: 400;
  line-height: 1.1;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
h1 em { color: var(--gold); font-style: italic; }
.subtitle {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  max-width: 460px;
  margin: 0 auto;
  font-weight: 400;
}

/* ── PROGRESS BAR ── */
.progress-wrap {
  margin-bottom: 36px;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.progress-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.progress-counter {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--gold);
}
.progress-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
/* Month dots */
.month-dots {
  display: flex;
  gap: 5px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.mdot {
  width: 20px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  transition: all 0.3s;
}
.mdot.done { background: var(--green); }
.mdot.active { background: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,0.5); }

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 16px;
  animation: fadeSlide 0.35s ease both;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-tag::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.card h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  font-weight: 400;
  margin-bottom: 24px;
  line-height: 1.3;
}

/* ── INPUTS ── */
.field { margin-bottom: 20px; }
.field-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted2);
  margin-bottom: 8px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}
input[type="text"], input[type="number"] {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 400;
  padding: 14px 18px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus, input[type="number"]:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
}
input::placeholder { color: #2e3d4f; }

/* ── SLIDERS ── */
.slider-container { margin-top: 6px; }
.slider-row {
  display: flex;
  align-items: center;
  gap: 16px;
}
input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  background: var(--gold);
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid var(--bg);
  box-shadow: 0 0 0 1px var(--gold), 0 2px 8px rgba(201,168,76,0.4);
  transition: transform 0.15s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
.range-val {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--gold);
  min-width: 100px;
  text-align: right;
}
.range-hints {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

/* ── BUDGET HEADER ── */
.budget-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.bh-cell {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.bh-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.bh-value {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  color: var(--green);
  transition: color 0.3s;
}
.bh-value.warn { color: var(--gold); }
.bh-value.danger { color: var(--red); }
.bh-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}
.goal-bar-wrap {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
}
.goal-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--green));
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ── MONTH BADGE ── */
.month-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--blue);
  background: var(--blue-dim);
  border: 1px solid rgba(74,158,255,0.2);
  padding: 5px 12px;
  border-radius: 6px;
  margin-bottom: 16px;
}

/* ── EVENT CARD ── */
.event-wrap {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px;
  margin-bottom: 14px;
  transition: border-color 0.3s;
}
.event-wrap.resolved { border-color: var(--border2); }
.ev-head {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
.ev-icon {
  font-size: 24px;
  line-height: 1;
  flex-shrink: 0;
}
.ev-title {
  font-family: 'DM Serif Display', serif;
  font-size: 17px;
  font-weight: 400;
  line-height: 1.3;
}
.ev-desc {
  font-size: 13px;
  color: var(--muted2);
  line-height: 1.65;
  margin-bottom: 14px;
}

/* ── CHOICE GRID ── */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.choices.triple { grid-template-columns: 1fr 1fr 1fr; }
.choices.single { grid-template-columns: 1fr; }

.choice-btn {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.choice-btn:hover:not(:disabled) {
  border-color: var(--gold);
  background: var(--gold-dim);
  transform: translateY(-1px);
}
.ch-cost {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  margin-top: 2px;
}
.choice-btn.sel-good {
  border-color: var(--green);
  background: var(--green-dim);
}
.choice-btn.sel-good .ch-cost { color: var(--green); }
.choice-btn.sel-bad {
  border-color: var(--red);
  background: var(--red-dim);
}
.choice-btn.sel-bad .ch-cost { color: var(--red); }
.choice-btn.sel-neutral {
  border-color: var(--gold);
  background: var(--gold-dim);
}
.choice-btn.sel-neutral .ch-cost { color: var(--gold); }
.choice-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
.choice-btn.selected:disabled { opacity: 1; }

/* ── FEEDBACK ── */
.feedback-box {
  margin-top: 12px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.6;
  display: none;
  animation: fadeSlide 0.3s ease;
}
.feedback-box.good { background: var(--green-dim); border: 1px solid rgba(63,182,140,0.2); color: #7edfc0; }
.feedback-box.bad { background: var(--red-dim); border: 1px solid rgba(224,82,82,0.2); color: #f09090; }
.feedback-box.neutral { background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); color: var(--gold2); }

/* ── MAIN BUTTON ── */
.btn-primary {
  display: block;
  width: 100%;
  background: var(--gold);
  color: #0a0800;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 17px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
  margin-top: 8px;
}
.btn-primary:hover:not(:disabled) {
  background: var(--gold2);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(201,168,76,0.3);
}
.btn-primary:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.btn-secondary {
  display: block;
  width: 100%;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted2);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 10px;
}
.btn-secondary:hover { border-color: var(--muted); color: var(--text); }

/* ── RESULT ── */
.result-hero {
  text-align: center;
  padding: 32px 0 24px;
}
.score-display {
  width: 130px; height: 130px;
  border-radius: 50%;
  margin: 0 auto 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'DM Serif Display', serif;
  border: 2px solid;
  position: relative;
}
.score-display.great { border-color: var(--green); box-shadow: 0 0 40px rgba(63,182,140,0.25), inset 0 0 40px rgba(63,182,140,0.05); }
.score-display.ok { border-color: var(--gold); box-shadow: 0 0 40px rgba(201,168,76,0.25), inset 0 0 40px rgba(201,168,76,0.05); }
.score-display.bad { border-color: var(--red); box-shadow: 0 0 40px rgba(224,82,82,0.25), inset 0 0 40px rgba(224,82,82,0.05); }
.score-number {
  font-size: 36px;
  line-height: 1;
}
.score-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; color: var(--muted); margin-top: 4px; }
.result-title {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  margin-bottom: 10px;
}
.result-desc {
  color: var(--muted2);
  font-size: 14px;
  line-height: 1.7;
  max-width: 460px;
  margin: 0 auto 28px;
}

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.stat-cell {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.stat-num {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  margin-bottom: 4px;
}
.stat-lbl { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

/* ── HISTORY ── */
.hist-item {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  font-size: 13px;
}
.hist-item:last-child { border-bottom: none; }
.hi-left { flex: 1; }
.hi-name { font-weight: 500; color: var(--text); }
.hi-sub { color: var(--muted); font-size: 11px; margin-top: 2px; font-family: 'DM Mono', monospace; }
.hi-amount { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; white-space: nowrap; }
.hi-amount.neg { color: var(--red); }
.hi-amount.pos { color: var(--green); }
.hi-amount.zero { color: var(--muted); }

/* ── PRINT ── */
.print-box {
  background: var(--card2);
  border: 1px dashed var(--border2);
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
  font-size: 13px;
  line-height: 2;
}
.print-box strong { color: var(--text); }

/* ── SCREEN MANAGEMENT ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── SCROLLABLE EVENTS ── */
.events-container { margin-bottom: 20px; }

/* ── DIVIDER ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}

@media (max-width: 520px) {
  .choices { grid-template-columns: 1fr; }
  .choices.triple { grid-template-columns: 1fr; }
  .budget-header { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .card { padding: 20px 16px; }
}

@media print {
  body { background: white; color: black; }
  .btn-primary, .btn-secondary, .progress-wrap, header { display: none; }
}
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="kib-badge">KiberOne · Финансовая грамотность</div>
    <h1>Финансовый<br><em>Симулятор</em></h1>
    <p class="subtitle">Проживи 12 месяцев, принимай финансовые решения и узнай, насколько умно ты управляешь деньгами</p>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span class="progress-label">Прогресс</span>
      <span class="progress-counter" id="progressCounter">1 / 14</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:7%"></div>
    </div>
    <div class="month-dots" id="monthDots"></div>
  </div>

  <!-- ═══ SCREEN 1: Настройка ═══ -->
  <div class="screen active" id="s1">
    <div class="card">
      <div class="section-tag">Шаг 1 — Профиль</div>
      <h2>Расскажи о себе</h2>

      <div class="field">
        <label class="field-label">Твоё имя</label>
        <input type="text" id="name" placeholder="Введи имя..." maxlength="30">
      </div>

      <div class="field">
        <label class="field-label">Карманные деньги в месяц</label>
        <div class="slider-container">
          <div class="slider-row">
            <input type="range" id="incomeSlider" min="10000" max="500000" step="5000" value="30000" oninput="updateIncome()">
            <div class="range-val" id="incomeVal">30 000 ₸</div>
          </div>
          <div class="range-hints"><span>10 000 ₸</span><span>500 000 ₸</span></div>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Моя финансовая цель</label>
        <input type="text" id="goal" placeholder="Например: iPhone, велосипед, курс..." maxlength="40">
      </div>

      <div class="field">
        <label class="field-label">Сумма цели</label>
        <div class="slider-container">
          <div class="slider-row">
            <input type="range" id="goalSlider" min="20000" max="2000000" step="10000" value="200000" oninput="updateGoal()">
            <div class="range-val" id="goalVal">200 000 ₸</div>
          </div>
          <div class="range-hints"><span>20 000 ₸</span><span>2 000 000 ₸</span></div>
        </div>
      </div>

      <button class="btn-primary" onclick="startGame()">Начать симуляцию →</button>
    </div>
  </div>

  <!-- ═══ SCREENS 2-13: Месяцы ═══ -->
  <div id="monthScreensContainer"></div>

  <!-- ═══ SCREEN 14: Результат ═══ -->
  <div class="screen" id="s14">
    <div class="card" id="resultCard"></div>
    <div class="card">
      <div class="section-tag">Все решения</div>
      <div id="historyList"></div>
    </div>
    <div class="print-box" id="printSummary"></div>
    <button class="btn-secondary" onclick="restart()">↺ Начать заново</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════
// ДАННЫЕ
// ══════════════════════════════════════════════════
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

// 12 месяцев × 2 события, у каждого события 4-6 вариантов
const EVENTS = [
  // ─── ЯНВАРЬ ───
  [
    {
      emoji: '🎮',
      title: 'Новый скин в любимой игре',
      desc: 'Все друзья уже купили этот скин за 4 500 ₸. Он абсолютно ничего не улучшает в игровом плане — только внешний вид персонажа. Тебя давят сверстники.',
      options: [
        { text: '💸 Купить немедленно', cost: -4500, type: 'bad', feedback: 'Импульсивная покупка под давлением группы. Скин не даёт никаких преимуществ.' },

// СОСТОЯНИЕ
// ══════════════════════════════════════════════════
let state = {
  name: '',
  income: 30000,
  goal: '',
  goalAmount: 200000,
  balance: 0,
  savedTotal: 0,
  history: [],
  choices: new Array(24).fill(null),
};

// ══════════════════════════════════════════════════
// УТИЛИТЫ
// ══════════════════════════════════════════════════
function fmt(n) {
  return Math.abs(n).toLocaleString('ru-RU') + ' ₸';
}

function updateIncome() {
  const v = +document.getElementById('incomeSlider').value;
  state.income = v;
  document.getElementById('incomeVal').textContent = v.toLocaleString('ru-RU') + ' ₸';
}

function updateGoal() {
  const v = +document.getElementById('goalSlider').value;
  state.goalAmount = v;
  document.getElementById('goalVal').textContent = v.toLocaleString('ru-RU') + ' ₸';
}

// ══════════════════════════════════════════════════
// ПРОГРЕСС
// ══════════════════════════════════════════════════
function updateProgress(screen) {
  const total = 14;
  const pct = Math.round((screen / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCounter').textContent = screen + ' / ' + total;

  const dots = document.getElementById('monthDots');
  dots.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const d = document.createElement('div');
    const monthScreen = i + 2;
    d.className = 'mdot' + (monthScreen < screen ? ' done' : monthScreen === screen ? ' active' : '');
    dots.appendChild(d);
  }
}

// ══════════════════════════════════════════════════
// СТАРТ ИГРЫ
// ══════════════════════════════════════════════════
function startGame() {
  state.name = document.getElementById('name').value.trim() || 'Игрок';
  state.income = +document.getElementById('incomeSlider').value;
  state.goal = document.getElementById('goal').value.trim() || 'Мечта';
  state.goalAmount = +document.getElementById('goalSlider').value;
  state.balance = state.income;
  state.savedTotal = 0;
  state.history = [];
  state.choices = new Array(24).fill(null);

  // Build month screens
  buildMonthScreens();
  showScreen(2);
}

function buildMonthScreens() {
  const container = document.getElementById('monthScreensContainer');
  container.innerHTML = '';
  for (let m = 0; m < 12; m++) {
    const div = document.createElement('div');
    div.className = 'screen';
    div.id = 's' + (m + 2);
    div.innerHTML = '<div class="card" id="mc' + m + '"></div>';
    container.appendChild(div);
  }
}

// ══════════════════════════════════════════════════
// ОТОБРАЖЕНИЕ МЕСЯЦА
// ══════════════════════════════════════════════════
function renderMonth(mIdx) {
  const cardEl = document.getElementById('mc' + mIdx);
  const month = MONTHS[mIdx];
  const events = EVENTS[mIdx];

  const balClass = state.balance < state.income * 0.25 ? 'danger'
                 : state.balance < state.income * 0.5 ? 'warn' : '';
  const goalPct = Math.min(100, Math.round(state.savedTotal / state.goalAmount * 100));

  let html = `
    <div class="section-tag">Месяц ${mIdx + 1} из 12</div>
    <div class="month-badge">📅 ${month}</div>
    <h2>Принимай решения этого месяца</h2>

    <div class="budget-header">
      <div class="bh-cell">
        <div class="bh-label">Текущий баланс</div>
        <div class="bh-value ${balClass}" id="bal_${mIdx}">${fmt(state.balance)}</div>
        <div class="bh-sub">Доход этого месяца: ${fmt(state.income)}</div>
      </div>
      <div class="bh-cell">
        <div class="bh-label">Цель: ${state.goal}</div>
        <div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--muted2);margin-bottom:4px">${fmt(state.savedTotal)} / ${fmt(state.goalAmount)}</div>
        <div class="goal-bar-wrap">
          <div class="goal-bar-fill" id="gbar_${mIdx}" style="width:${goalPct}%"></div>
        </div>
        <div class="bh-sub" style="margin-top:6px">${goalPct}% достигнуто</div>
      </div>
    </div>

    <div class="events-container">
  `;

  events.forEach((ev, ei) => {
    const gIdx = mIdx * 2 + ei;
    const cols = ev.options.length >= 5 ? 'triple' : ev.options.length === 1 ? 'single' : '';

    html += `
      <div class="event-wrap" id="ew_${gIdx}">
        <div class="ev-head">
          <div class="ev-icon">${ev.emoji}</div>
          <div class="ev-title">${ev.title}</div>
        </div>
        <div class="ev-desc">${ev.desc}</div>
        <div class="choices ${cols}">
          ${ev.options.map((opt, oi) => {
            const costLabel = opt.cost === 0 ? '<span style="color:var(--muted)">Бесплатно</span>'
              : opt.cost > 0 ? `<span style="color:var(--green)">+${fmt(opt.cost)}</span>`
              : `<span style="color:var(--red)">−${fmt(-opt.cost)}</span>`;
            return `
              <button class="choice-btn" id="cb_${gIdx}_${oi}" onclick="makeChoice(${mIdx},${ei},${oi})">
                <span>${opt.text}</span>
                <span class="ch-cost">${costLabel}</span>
              </button>`;
          }).join('')}
        </div>
        <div class="feedback-box" id="fb_${gIdx}"></div>
      </div>
    `;
  });

  html += `</div>`;

  const isLast = mIdx === 11;
  html += `<button class="btn-primary" id="nb_${mIdx}" disabled onclick="nextMonth(${mIdx})">
    ${isLast ? 'Посмотреть результат →' : 'Следующий месяц →'}
  </button>`;

  cardEl.innerHTML = html;
  state['md_' + mIdx] = [false, false];
}

// ══════════════════════════════════════════════════
// ВЫБОР
// ══════════════════════════════════════════════════
function makeChoice(mIdx, evIdx, optIdx) {
  const gIdx = mIdx * 2 + evIdx;
  if (state.choices[gIdx] !== null) return;

  const ev = EVENTS[mIdx][evIdx];
  const opt = ev.options[optIdx];

  state.choices[gIdx] = optIdx;
  state.balance += opt.cost;

  state.history.push({
    month: MONTHS[mIdx],
    event: ev.title,
    choice: opt.text,
    cost: opt.cost,
    type: opt.type
  });

  // Feedback
  const fb = document.getElementById('fb_' + gIdx);
  fb.textContent = opt.feedback;
  fb.className = 'feedback-box ' + (opt.type === 'good' ? 'good' : opt.type === 'bad' ? 'bad' : 'neutral');
  fb.style.display = 'block';

  // Style buttons
  ev.options.forEach((o, i) => {
    const btn = document.getElementById('cb_' + gIdx + '_' + i);
    if (!btn) return;
    btn.disabled = true;
    if (i === optIdx) {
      btn.classList.add('sel-' + (opt.type === 'good' ? 'good' : opt.type === 'bad' ? 'bad' : 'neutral'));
    } else {
      btn.style.opacity = '0.25';
    }
  });

  // Update balance display
  const balEl = document.getElementById('bal_' + mIdx);
  if (balEl) {
    balEl.textContent = fmt(state.balance);
    balEl.className = 'bh-value' + (state.balance < state.income * 0.25 ? ' danger' : state.balance < state.income * 0.5 ? ' warn' : '');
  }

  // Check completion
  const done = state['md_' + mIdx];
  done[evIdx] = true;
  if (done[0] && done[1]) {
    const nb = document.getElementById('nb_' + mIdx);
    if (nb) nb.disabled = false;
  }
}

// ══════════════════════════════════════════════════
// СМЕНА МЕСЯЦА
// ══════════════════════════════════════════════════
function nextMonth(mIdx) {
  const saved = Math.max(0, state.balance);
  state.savedTotal += saved;

  if (mIdx < 11) {
    state.balance = state.income;
    showScreen(mIdx + 3);
    renderMonth(mIdx + 1);
  } else {
    showScreen(14);
    renderResult();
  }
}

// ══════════════════════════════════════════════════
// НАВИГАЦИЯ
// ══════════════════════════════════════════════════
function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('s' + n);
  if (el) el.classList.add('active');
  updateProgress(n);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════
// РЕЗУЛЬТАТ
// ══════════════════════════════════════════════════
function renderResult() {
  const total = state.history.length;
  const good = state.history.filter(h => h.type === 'good').length;
  const bad = state.history.filter(h => h.type === 'bad').length;
  const score = Math.round((good / total) * 100);
  const goalPct = Math.min(100, Math.round(state.savedTotal / state.goalAmount * 100));

  const ring = score >= 70 ? 'great' : score >= 45 ? 'ok' : 'bad';
  const emoji = score >= 70 ? '🏆' : score >= 45 ? '📈' : '💡';
  const title = score >= 70 ? 'Финансовый стратег!'
              : score >= 45 ? 'Хорошее начало!'
              : 'Есть куда расти!';
  const desc = score >= 70
    ? `${state.name}, ты принимал взвешенные финансовые решения на протяжении целого года. Умение планировать, избегать импульсивных трат и находить альтернативы — это и есть финансовая грамотность.`
    : score >= 45
    ? `${state.name}, ты сделал ряд умных решений, но некоторые траты можно было избежать. Главный вывод: маленькие ежедневные решения определяют финансовый результат.`
    : `${state.name}, этот год был непростым. Импульсивные покупки и упущенные возможности заработка существенно повлияли на результат. Но теперь ты знаешь, на что обращать внимание!`;

  document.getElementById('resultCard').innerHTML = `
    <div class="section-tag">Итоги симуляции — 12 месяцев</div>
    <div class="result-hero">
      <div class="score-display ${ring}">
        <div class="score-number">${score}%</div>
        <div class="score-label">СЧЁТ</div>
      </div>
      <div class="result-title">${emoji} ${title}</div>
      <div class="result-desc">${desc}</div>
    </div>

    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-num" style="color:var(--green)">${good}</div>
        <div class="stat-lbl">Умных решений</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num" style="color:var(--red)">${bad}</div>
        <div class="stat-lbl">Ошибок</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num" style="color:var(--gold)">${total}</div>
        <div class="stat-lbl">Всего решений</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="bh-label" style="margin-bottom:12px">Прогресс к цели: ${state.goal}</div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px">
      <span>${fmt(state.savedTotal)} накоплено</span>
      <span style="color:var(--gold)">${goalPct}%</span>
    </div>
    <div class="goal-bar-wrap" style="height:8px">
      <div class="goal-bar-fill" style="width:${goalPct}%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted)">
      <span>0 ₸</span><span>${fmt(state.goalAmount)}</span>
    </div>
  `;

  // History
  document.getElementById('historyList').innerHTML = state.history.map(h => `
    <div class="hist-item">
      <div class="hi-left">
        <div class="hi-name">${h.event}</div>
        <div class="hi-sub">${h.month}</div>
      </div>
      <div class="hi-amount ${h.cost < 0 ? 'neg' : h.cost > 0 ? 'pos' : 'zero'}">
        ${h.cost === 0 ? '—' : (h.cost > 0 ? '+' : '−') + fmt(Math.abs(h.cost))}
      </div>
    </div>
  `).join('');

  // Print
  document.getElementById('printSummary').innerHTML = `
    <div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:12px">📄 Сводка результатов</div>
    <div style="font-size:13px;line-height:2.2;color:var(--muted2)">
      <strong style="color:var(--text)">Имя:</strong> ${state.name}<br>
      <strong style="color:var(--text)">Цель:</strong> ${state.goal} — ${fmt(state.goalAmount)}<br>
      <strong style="color:var(--text)">Накоплено:</strong> ${fmt(state.savedTotal)} (${goalPct}% от цели)<br>
      <strong style="color:var(--text)">Финансовый рейтинг:</strong> ${score}% — ${title}<br>
      <strong style="color:var(--text)">Умных решений:</strong> ${good} из ${total}
    </div>
  `;
}

// ══════════════════════════════════════════════════
// РЕСТАРТ
// ══════════════════════════════════════════════════
function restart() {
  state = {
    name:'', income:30000, goal:'', goalAmount:200000,
    balance:0, savedTotal:0, history:[], choices: new Array(24).fill(null)
  };
  document.getElementById('name').value = '';
  document.getElementById('goal').value = '';
  document.getElementById('incomeSlider').value = 30000;
  document.getElementById('goalSlider').value = 200000;
  updateIncome(); updateGoal();
  showScreen(1);
}

// ══════════════════════════════════════════════════
// ИНИЦИАЛИЗАЦИЯ
// ══════════════════════════════════════════════════
updateIncome();
updateGoal();
updateProgress(1);
</script>
</body>
</html>
