<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доска Желаний</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Unbounded:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#c9a84c;--gold-light:#e8cc80;--cream:#fdf6e3;--dark:#0e0c08;--dark2:#1a1710;--dark3:#252219;--card-bg:rgba(255,255,255,0.04);--border:rgba(201,168,76,0.25);--text-dim:rgba(253,246,227,0.5)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--dark);color:var(--cream);font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6}
  #loadingScreen{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:999}
  .loading-ring{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);border-top-color:var(--gold);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.4em;color:var(--text-dim);text-transform:uppercase}
  #landing{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:1;padding:40px 20px}
  .landing-orb{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:pulse 4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}}
  .landing-logo{font-family:'Unbounded',sans-serif;font-size:clamp(10px,1.5vw,13px);font-weight:300;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;margin-bottom:24px;opacity:0;animation:fadeUp .8s ease forwards .2s}
  .landing-title{font-size:clamp(42px,7vw,90px);font-weight:300;font-style:italic;line-height:1.05;text-align:center;letter-spacing:-.01em;margin-bottom:20px;opacity:0;animation:fadeUp .8s ease forwards .4s}
  .landing-title span{color:var(--gold);display:block;font-style:normal;font-weight:600}
  .landing-sub{font-size:clamp(15px,2vw,19px);color:var(--text-dim);text-align:center;max-width:480px;line-height:1.7;margin-bottom:52px;opacity:0;animation:fadeUp .8s ease forwards .6s}
  .name-form{display:flex;flex-direction:column;align-items:center;gap:16px;opacity:0;animation:fadeUp .8s ease forwards .8s;width:100%;max-width:400px}
  .name-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;padding:12px 4px;text-align:center;outline:none;transition:border-color .3s;letter-spacing:.05em}
  .name-input::placeholder{color:var(--text-dim)}
  .name-input:focus{border-color:var(--gold)}
  .btn-create{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--dark);font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;padding:16px 44px;border:none;cursor:pointer;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));transition:all .3s;margin-top:8px}
  .btn-create:hover{background:linear-gradient(135deg,var(--gold-light),var(--gold));transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,.4)}
  .btn-create:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .divider-line{width:1px;height:60px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);margin:40px 0;opacity:0;animation:fadeUp .8s ease forwards 1s}
  .existing-boards{opacity:0;animation:fadeUp .8s ease forwards 1.1s;text-align:center}
  .existing-label{font-size:11px;font-family:'Unbounded',sans-serif;letter-spacing:.35em;color:var(--text-dim);text-transform:uppercase;margin-bottom:16px}
  .boards-list{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:500px}
  .board-chip{background:var(--card-bg);border:1px solid var(--border);color:var(--gold-light);font-family:'Cormorant Garamond',serif;font-size:15px;padding:8px 18px;cursor:pointer;transition:all .25s;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
  .board-chip:hover{background:rgba(201,168,76,.12);border-color:var(--gold)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  #board-page{display:none;min-height:100vh;position:relative;z-index:1;padding:40px 20px 80px}
  .board-header{display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto 60px;flex-wrap:wrap;gap:16px}
  .back-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.3em;text-transform:uppercase;padding:10px 20px;cursor:pointer;transition:all .25s}
  .back-btn:hover{border-color:var(--gold);color:var(--gold)}
  .board-title-area{text-align:center;flex:1}
  .board-logo-small{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.4em;color:var(--gold);opacity:.7}
  .share-btn{background:none;border:1px solid var(--border);color:var(--gold);font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.3em;text-transform:uppercase;padding:10px 20px;cursor:pointer;transition:all .25s}
  .share-btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold)}
  .collage-wrap{max-width:900px;margin:0 auto 60px;position:relative}
  .collage-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,200px);gap:12px}
  .center-cell{grid-column:2;grid-row:2;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .center-ring{width:160px;height:160px;border-radius:50%;border:1px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle,rgba(201,168,76,.08) 0%,var(--dark2) 70%);box-shadow:0 0 60px rgba(201,168,76,.15),inset 0 0 30px rgba(201,168,76,.05);padding:16px;position:relative}
  .center-ring::before{content:'';position:absolute;inset:6px;border-radius:50%;border:1px solid rgba(201,168,76,.2)}
  .center-name{font-size:18px;font-weight:600;font-style:italic;color:var(--gold-light);line-height:1.2;word-break:break-word;position:relative;z-index:1}
  .center-label{font-family:'Unbounded',sans-serif;font-size:7px;letter-spacing:.4em;color:var(--text-dim);margin-top:6px;text-transform:uppercase;position:relative;z-index:1}
  .wish-card{background:var(--card-bg);border:1px solid var(--border);position:relative;overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.25,.8,.25,1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px 14px;text-align:center;animation:cardIn .6s ease both}
  @keyframes cardIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  .wish-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.06) 0%,transparent 60%);opacity:0;transition:opacity .3s}
  .wish-card:hover::before{opacity:1}
  .wish-card:hover{border-color:var(--gold);transform:scale(1.03);box-shadow:0 8px 40px rgba(201,168,76,.15);z-index:10}
  .wish-card.has-image{padding:0}
  .card-image-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.55) saturate(.8);transition:filter .3s}
  .wish-card:hover .card-image-bg{filter:brightness(.65) saturate(1)}
  .card-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px;width:100%}
  .card-icon{font-size:28px;line-height:1;filter:drop-shadow(0 2px 8px rgba(201,168,76,.3))}
  .card-category{font-family:'Unbounded',sans-serif;font-size:7.5px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase}
  .card-wish-text{font-size:13px;font-style:italic;color:var(--cream);line-height:1.4;opacity:.9;word-break:break-word}
  .card-edit-hint{font-size:10px;color:var(--text-dim);font-family:'Unbounded',sans-serif;letter-spacing:.2em;opacity:0;transition:opacity .3s}
  .wish-card:hover .card-edit-hint{opacity:1}
  .top5-section{max-width:900px;margin:0 auto}
  .top5-label{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.45em;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:28px;display:flex;align-items:center;gap:20px;justify-content:center}
  .top5-label::before,.top5-label::after{content:'';height:1px;width:60px;background:linear-gradient(to right,transparent,var(--gold))}
  .top5-label::after{background:linear-gradient(to left,transparent,var(--gold))}
  .wishes-list{display:flex;flex-direction:column;gap:12px}
  .wish-row{display:flex;align-items:center;gap:16px;background:var(--card-bg);border:1px solid var(--border);padding:14px 20px;transition:border-color .25s;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px))}
  .wish-row:focus-within{border-color:var(--gold)}
  .wish-num{font-family:'Unbounded',sans-serif;font-size:11px;color:var(--gold);min-width:20px;opacity:.7}
  .wish-input{flex:1;background:none;border:none;outline:none;color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;letter-spacing:.02em}
  .wish-input::placeholder{color:var(--text-dim)}
  .wish-star{font-size:14px;opacity:.3;cursor:pointer;transition:opacity .2s;background:none;border:none;color:var(--gold)}
  .wish-star.active{opacity:1}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(14,12,8,.85);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.active{display:flex}
  .modal-box{background:var(--dark2);border:1px solid var(--border);max-width:480px;width:100%;padding:40px 36px;position:relative;clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));animation:modalIn .3s ease}
  @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-category-label{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
  .modal-icon{font-size:36px;margin-bottom:16px}
  .modal-heading{font-size:28px;font-style:italic;font-weight:300;margin-bottom:28px;color:var(--cream)}
  .modal-field-label{font-family:'Unbounded',sans-serif;font-size:8px;letter-spacing:.35em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px}
  .modal-textarea{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;padding:14px 16px;outline:none;resize:none;height:90px;line-height:1.5;transition:border-color .25s;margin-bottom:20px;display:block}
  .modal-textarea:focus{border-color:var(--gold)}
  .modal-image-label{font-family:'Unbounded',sans-serif;font-size:8px;letter-spacing:.35em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px}
  .modal-image-input{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:14px;padding:12px 16px;outline:none;margin-bottom:24px;display:block;transition:border-color .25s}
  .modal-image-input:focus{border-color:var(--gold)}
  .modal-actions{display:flex;gap:12px;justify-content:flex-end}
  .btn-cancel{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.3em;text-transform:uppercase;padding:12px 24px;cursor:pointer;transition:all .25s}
  .btn-cancel:hover{border-color:var(--cream);color:var(--cream)}
  .btn-save{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--dark);font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;padding:12px 28px;border:none;cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));transition:all .25s}
  .btn-save:hover{box-shadow:0 4px 20px rgba(201,168,76,.4);transform:translateY(-1px)}
  .close-modal{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;transition:color .2s}
  .close-modal:hover{color:var(--cream)}
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark3);border:1px solid var(--gold);color:var(--gold-light);font-family:'Unbounded',sans-serif;font-size:10px;letter-spacing:.25em;padding:14px 32px;z-index:200;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));opacity:0;pointer-events:none;transition:opacity .3s,transform .3s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .save-indicator{position:fixed;top:20px;right:24px;font-family:'Unbounded',sans-serif;font-size:8px;letter-spacing:.3em;color:var(--gold);opacity:0;transition:opacity .5s;z-index:50}
  .save-indicator.visible{opacity:.7}
  @media(max-width:640px){.collage-grid{grid-template-rows:repeat(3,150px);gap:8px}.center-ring{width:120px;height:120px}.center-name{font-size:14px}.card-icon{font-size:22px}.modal-box{padding:28px 22px}}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="loading-ring"></div>
  <div class="loading-text">Загрузка...</div>
</div>

<section id="landing">
  <div class="landing-orb"></div>
  <div class="landing-logo">Твоя Вселенная Желаний</div>
  <h1 class="landing-title">Доска<br><span>Желаний</span></h1>
  <p class="landing-sub">Визуализируй своё будущее. Собери желания в одном месте — и наблюдай, как они становятся реальностью.</p>
  <div class="name-form">
    <input class="name-input" id="nameInput" type="text" placeholder="Твоё имя..." maxlength="30" autocomplete="off">
    <button class="btn-create" id="createBtn" onclick="createBoard()">Создать мою доску</button>
  </div>
  <div class="divider-line"></div>
  <div class="existing-boards" id="existingBoards" style="display:none">
    <div class="existing-label">Доски других участников</div>
    <div class="boards-list" id="boardsList"></div>
  </div>
</section>

<section id="board-page">
  <div class="board-header">
    <button class="back-btn" onclick="goBack()">← Главная</button>
    <div class="board-title-area"><div class="board-logo-small">Доска Желаний</div></div>
    <button class="share-btn" onclick="copyLink()">Поделиться ↗</button>
  </div>
  <div class="collage-wrap">
    <div class="collage-grid" id="collageGrid"></div>
  </div>
  <div class="top5-section">
    <div class="top5-label">Топ 5 главных желаний</div>
    <div class="wishes-list" id="wishList"></div>
  </div>
</section>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="close-modal" onclick="closeModal()">✕</button>
    <div class="modal-category-label" id="modalCategoryLabel"></div>
    <div class="modal-icon" id="modalIcon"></div>
    <div class="modal-heading">Что ты хочешь?</div>
    <div class="modal-field-label">Моё желание</div>
    <textarea class="modal-textarea" id="modalWishText" placeholder="Опиши своё желание..."></textarea>
    <div class="modal-image-label">URL картинки (необязательно)</div>
    <input class="modal-image-input" id="modalImageUrl" type="text" placeholder="https://...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveCard()">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="save-indicator" id="saveIndicator">● Сохранено</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZR2uZfopaEXgFxgQswAzCYT03ZG84kH0",
  authDomain: "wish-board-69411.firebaseapp.com",
  projectId: "wish-board-69411",
  storageBucket: "wish-board-69411.firebasestorage.app",
  messagingSenderId: "327737368284",
  appId: "1:327737368284:web:7d239ef2b40aa48f27de19"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const CATEGORIES = [
  { id:'hobby',  label:'Хобби и Творчество', icon:'🎨' },
  { id:'pet',    label:'Питомец',             icon:'🐾' },
  { id:'love',   label:'Любовь',              icon:'💫' },
  { id:'wealth', label:'Богатство',           icon:'✨' },
  { id:'family', label:'Семья',               icon:'🌿' },
  { id:'study',  label:'Учёба',               icon:'📖' },
  { id:'work',   label:'Работа',              icon:'🏆' },
  { id:'travel', label:'Путешествия',         icon:'🌍' },
];
const GRID_ORDER = [0,1,2,3,null,4,5,6,7];

let currentBoard = null;
let editingCardIndex = null;
let top5Timer = null;
let saveTimerRef = null;

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function flashSave() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('visible');
  clearTimeout(saveTimerRef);
  saveTimerRef = setTimeout(() => el.classList.remove('visible'), 1500);
}
function showLoading(on) {
  document.getElementById('loadingScreen').style.display = on ? 'flex' : 'none';
}

// ── FIRESTORE ──
async function loadBoard(name) {
  const snap = await getDoc(doc(db, 'boards', name));
  return snap.exists() ? snap.data() : null;
}
async function saveBoard(name, data) {
  await setDoc(doc(db, 'boards', name), data);
  flashSave();
}
async function loadAllBoards() {
  const snap = await getDocs(collection(db, 'boards'));
  return snap.docs.map(d => d.id);
}

function initBoardData(name) {
  return {
    name,
    cards: CATEGORIES.map(c => ({ id:c.id, label:c.label, icon:c.icon, wish:'', image:'' })),
    top5: ['','','','',''],
    stars: [false,false,false,false,false],
    created: Date.now()
  };
}

// ── LANDING ──
async function checkExistingBoards() {
  try {
    const names = await loadAllBoards();
    if (!names.length) return;
    const el = document.getElementById('existingBoards');
    const list = document.getElementById('boardsList');
    el.style.display = 'block';
    list.innerHTML = names.map(k =>
      `<button class="board-chip" onclick="window._openBoard('${esc(k)}')">${esc(k)}</button>`
    ).join('');
  } catch(e) { console.error(e); }
}

window._openBoard = async function(name) {
  showLoading(true);
  try {
    let data = await loadBoard(name);
    if (!data) { showToast('Доска не найдена'); showLoading(false); return; }
    data.cards = CATEGORIES.map((cat, i) => ({ ...cat, ...(data.cards[i] || {}) }));
    currentBoard = name;
    renderBoard(data);
    document.getElementById('landing').style.display = 'none';
    document.getElementById('board-page').style.display = 'block';
    history.pushState({}, '', `#${encodeURIComponent(name)}`);
  } catch(e) { showToast('Ошибка загрузки'); console.error(e); }
  showLoading(false);
};

window.createBoard = async function() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('Введи своё имя ✨'); return; }
  const btn = document.getElementById('createBtn');
  btn.disabled = true; btn.textContent = 'Создаём...';
  showLoading(true);
  try {
    let data = await loadBoard(name);
    if (!data) { data = initBoardData(name); await saveBoard(name, data); }
    await window._openBoard(name);
  } catch(e) { showToast('Ошибка подключения'); console.error(e); }
  btn.disabled = false; btn.textContent = 'Создать мою доску';
  showLoading(false);
};

window.goBack = function() {
  currentBoard = null;
  document.getElementById('board-page').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  history.pushState({}, '', window.location.pathname);
  checkExistingBoards();
};

// ── RENDER ──
function renderBoard(data) { renderGrid(data); renderTop5(data); }

function renderGrid(data) {
  const grid = document.getElementById('collageGrid');
  grid.innerHTML = '';
  GRID_ORDER.forEach(item => {
    if (item === null) {
      const c = document.createElement('div');
      c.className = 'center-cell';
      c.innerHTML = `<div class="center-ring"><div class="center-name">${esc(data.name)}</div><div class="center-label">Мои желания</div></div>`;
      grid.appendChild(c);
    } else {
      const cat = data.cards[item];
      const card = document.createElement('div');
      card.className = 'wish-card' + (cat.image ? ' has-image' : '');
      card.onclick = () => openModal(item, data);
      let inner = '';
      if (cat.image) inner += `<div class="card-image-bg" style="background-image:url('${esc(cat.image)}')"></div>`;
      inner += `<div class="card-content"><div class="card-icon">${cat.icon}</div><div class="card-category">${esc(cat.label)}</div>${cat.wish ? `<div class="card-wish-text">${esc(cat.wish)}</div>` : ''}<div class="card-edit-hint">нажми чтобы изменить</div></div>`;
      card.innerHTML = inner;
      grid.appendChild(card);
    }
  });
}

function renderTop5(data) {
  document.getElementById('wishList').innerHTML = data.top5.map((wish, i) => `
    <div class="wish-row">
      <span class="wish-num">0${i+1}</span>
      <input class="wish-input" placeholder="Желание #${i+1}..." value="${esc(wish)}" oninput="window._updateTop5(${i}, this.value)">
      <button class="wish-star ${data.stars[i] ? 'active' : ''}" onclick="window._toggleStar(${i})">★</button>
    </div>`).join('');
}

// ── TOP 5 ──
window._updateTop5 = async function(index, value) {
  clearTimeout(top5Timer);
  top5Timer = setTimeout(async () => {
    const data = await loadBoard(currentBoard);
    data.top5[index] = value;
    await saveBoard(currentBoard, data);
  }, 800);
};

window._toggleStar = async function(index) {
  const data = await loadBoard(currentBoard);
  data.stars[index] = !data.stars[index];
  await saveBoard(currentBoard, data);
  document.querySelectorAll('.wish-star')[index].classList.toggle('active', data.stars[index]);
};

// ── MODAL ──
function openModal(cardIndex, data) {
  const cat = data.cards[cardIndex];
  editingCardIndex = cardIndex;
  document.getElementById('modalCategoryLabel').textContent = cat.label;
  document.getElementById('modalIcon').textContent = cat.icon;
  document.getElementById('modalWishText').value = cat.wish || '';
  document.getElementById('modalImageUrl').value = cat.image || '';
  document.getElementById('modalOverlay').classList.add('active');
}

window.closeModal = () => { document.getElementById('modalOverlay').classList.remove('active'); editingCardIndex = null; };

window.saveCard = async function() {
  if (editingCardIndex === null) return;
  const data = await loadBoard(currentBoard);
  data.cards[editingCardIndex].wish = document.getElementById('modalWishText').value.trim();
  data.cards[editingCardIndex].image = document.getElementById('modalImageUrl').value.trim();
  await saveBoard(currentBoard, data);
  renderGrid(data);
  closeModal();
  showToast('Желание сохранено ✨');
};

window.copyLink = () => {
  const url = `${location.origin}${location.pathname}#${encodeURIComponent(currentBoard)}`;
  navigator.clipboard.writeText(url).then(() => showToast('Ссылка скопирована ✨')).catch(() => showToast(url));
};

document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') createBoard(); });

// ── INIT ──
(async () => {
  showLoading(true);
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash) {
    const data = await loadBoard(hash);
    if (data) { await window._openBoard(hash); showLoading(false); return; }
  }
  await checkExistingBoards();
  document.getElementById('landing').style.display = 'flex';
  showLoading(false);
})();
</script>
</body>
</html>
